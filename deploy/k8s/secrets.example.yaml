apiVersion: v1
kind: Secret
metadata:
  name: retailpulse-secrets
type: Opaque
stringData:
  API_PORT: "4000"
  DATABASE_URL: postgres://retailpulse:retailpulse@retailpulse-postgres:5432/retailpulse?sslmode=disable
  REDIS_ADDR: retailpulse-redis:6379
  JWT_ACCESS_SECRET: replace-with-at-least-32-bytes-access-secret
  JWT_REFRESH_SECRET: replace-with-at-least-32-bytes-refresh-secret
  TOKEN_ENCRYPTION_KEY: replace-with-32-byte-base64-key
  POSTGRES_USER: retailpulse
  POSTGRES_PASSWORD: retailpulse
  S3_ACCESS_KEY: retailpulse
  S3_SECRET_KEY: retailpulse-secret

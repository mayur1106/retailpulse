apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailpulse-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retailpulse-web
  template:
    metadata:
      labels:
        app: retailpulse-web
    spec:
      containers:
        - name: web
          image: retailpulse-web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: http://retailpulse-api:4000
---
apiVersion: v1
kind: Service
metadata:
  name: retailpulse-web
spec:
  selector:
    app: retailpulse-web
  ports:
    - port: 3000
      targetPort: 3000

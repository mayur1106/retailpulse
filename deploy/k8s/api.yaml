apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailpulse-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retailpulse-api
  template:
    metadata:
      labels:
        app: retailpulse-api
    spec:
      containers:
        - name: api
          image: retailpulse-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: retailpulse-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: retailpulse-api
spec:
  selector:
    app: retailpulse-api
  ports:
    - port: 4000
      targetPort: 4000
